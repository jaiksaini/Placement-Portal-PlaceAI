<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#gold)"/>

  <!-- Subtle inner glow border -->
  <rect x="3" y="3" width="94" height="94" rx="19" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.35"/>

  <!-- Graduation cap board (top flat part) -->
  <polygon points="50,22 84,36 50,50 16,36" fill="white" opacity="0.95"/>

  <!-- Cap shadow line -->
  <polygon points="50,50 84,36 84,40 50,54 16,40 16,36" fill="#f59e0b" opacity="0.3"/>

  <!-- Stem going down from center -->
  <rect x="47" y="49" width="6" height="22" rx="2.5" fill="white" opacity="0.85"/>

  <!-- Mortarboard base circle (head) -->
  <ellipse cx="50" cy="72" rx="13" ry="5" fill="white" opacity="0.2"/>

  <!-- Tassel cord on right -->
  <line x1="80" y1="38" x2="80" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Tassel end ball -->
  <circle cx="80" cy="66" r="5" fill="white" opacity="0.8"/>

  <!-- AI badge bottom right -->
  <rect x="58" y="74" width="30" height="16" rx="5" fill="#92400e" opacity="0.85"/>
  <rect x="59" y="75" width="28" height="14" rx="4" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
  <text x="73" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#fef3c7">AI</text>

  <!-- Sparkle top left -->
  <circle cx="20" cy="20" r="2.5" fill="#fef3c7" opacity="0.7"/>
  <circle cx="80" cy="18" r="1.8" fill="#fef3c7" opacity="0.5"/>
  <circle cx="14" cy="72" r="1.5" fill="#fef3c7" opacity="0.4"/>
</svg>
